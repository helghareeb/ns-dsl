# Dockerized testbed reproducing the decision-layer topology: R peer services + a Redis event bus
# + a Postgres instance (one logical DB per service honors data sovereignty). The measured-latency
# numbers in the paper come from bench/latency_bench.py; this Compose file deploys the same peer
# endpoints across containers for fidelity and reuse.
services:
  redis:
    image: redis:7
    ports: ["6379:6379"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: nsdsl
      POSTGRES_DB: nsdsl
    ports: ["5432:5432"]

  peer0:
    build: { context: .., dockerfile: docker/Dockerfile.service }
    environment: { PEER_ID: p0, RTT_MS: "2.0" }
    ports: ["8000:8000"]
    depends_on: [redis, postgres]

  peer1:
    build: { context: .., dockerfile: docker/Dockerfile.service }
    environment: { PEER_ID: p1, RTT_MS: "2.0" }
    depends_on: [redis]

  peer2:
    build: { context: .., dockerfile: docker/Dockerfile.service }
    environment: { PEER_ID: p2, RTT_MS: "2.0" }
    depends_on: [redis]

  peer3:
    build: { context: .., dockerfile: docker/Dockerfile.service }
    environment: { PEER_ID: p3, RTT_MS: "2.0" }
    depends_on: [redis]

  peer4:
    build: { context: .., dockerfile: docker/Dockerfile.service }
    environment: { PEER_ID: p4, RTT_MS: "2.0" }
    depends_on: [redis]
